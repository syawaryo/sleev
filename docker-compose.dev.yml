services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn api:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/sleeve_checker
      --reload-dir /app
      --reload-include "*.py"
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FRONTEND_URL=http://localhost:5173
    volumes:
      # Live source code: any .py change triggers uvicorn --reload
      - ./sleeve_checker:/app/sleeve_checker
      - ./api.py:/app/api.py
      # Sample data, cache
      - ./dxf_output:/app/dxf_output
      - ./ifc_output:/app/ifc_output
      - ./.parse_cache:/app/.parse_cache

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      # Anonymous volume so host node_modules don't clobber container's
      - /app/frontend/node_modules
    environment:
      # vite proxy resolves the backend via docker DNS
      - VITE_API_PROXY_TARGET=http://api:8000
    depends_on:
      - api
